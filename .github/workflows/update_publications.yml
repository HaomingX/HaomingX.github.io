name: Update Publications from Google Scholar

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:   # allow manual run from the Actions tab

# ── Permissions ───────────────────────────────────────────────────────────────
permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install scholarly requests beautifulsoup4 lxml

      # ── 4. Run updater ───────────────────────────────────────────────────────
      - name: Fetch & update publications
        run: python scripts/update_publications.py

      # ── 5. Commit if anything changed ────────────────────────────────────────
      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _pages/about.md
          # Only commit when there are actual staged changes
          if git diff --staged --quiet; then
            echo "No new publications found – nothing to commit."
          else
            git commit -m "chore: auto-update publications from Google Scholar [skip ci]"
            git push
          fi
